<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Order — Precimo</title><link rel="stylesheet" href="assets/css/style.css"></head><body>

<header class="nav">
  <div class="container nav-inner">
    <a class="brand" href="index.html">Precimo <span class="spark">✦</span></a>
    <nav class="nav-links">
      <a href="designs.html">Designs</a>
      <a href="index.html#how">How it works</a>
      <a class="nav-cta" href="order.html">Order now</a>
    </nav>
  </div>

<main>
<section class="page-hero"><div class="container"><div class="pill">✦ Personalise your moment</div><h1>Tell us what you want them to <span class="gradient">feel.</span></h1><p>This first version collects the order details. Photo upload, payment and WhatsApp connection come next.</p></div></section>
<section><div class="container"><form class="form-card" id="orderForm">
<div class="form-grid">
<div class="field full"><label>Selected design</label><input id="design" name="design" value="Choose from Designs page" required></div>
<div class="field"><label>Your name</label><input name="name" required></div>
<div class="field"><label>Recipient's name</label><input name="recipient" required></div>
<div class="field"><label>Occasion</label><select name="occasion"><option>Proposal</option><option>Birthday</option><option>Anniversary</option><option>Apology</option><option>Other</option></select></div>
<div class="field"><label>Required delivery date</label><input name="date" type="date" required></div>
<div class="field full"><label>Your message or idea</label><textarea name="message" placeholder="Tell us about the person, memories and feeling you want to create..." required></textarea></div>
<div class="field full"><button class="btn btn-primary" type="submit">Continue with this order</button></div>
</div>
</form></div></section>
</main>
<footer><div class="container">© <span data-year></span> Precimo</div></footer>
<script src="assets/js/app.js"></script></body></html>
